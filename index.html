<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Jastip</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #f0ede8;
    --text2: #9a9590;
    --text3: #6a6560;
    --green: #4caf7d;
    --red: #e05c5c;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  .brand span {
    color: var(--text2);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    margin-left: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .order-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    padding: 8px 18px;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
  }
  .order-btn:hover { background: var(--accent2); }

  /* ── FILTER ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: 500; }

  /* ── GRID ── */
  .main { padding: 24px 16px; max-width: 960px; margin: 0 auto; }

  .count {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  /* ── PRODUCT CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease both;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    border-color: var(--accent);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--surface2);
    display: block;
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 28px;
  }

  .card-body { padding: 12px; }

  .card-name {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-price {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--accent);
  }

  .card-kategori {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    backdrop-filter: blur(4px);
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--surface2);
    margin-top: 12px;
  }

  .modal-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 64px;
    margin-top: 12px;
  }

  .modal-content { padding: 20px 20px 32px; }

  .modal-kategori {
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }

  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .modal-price {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  /* ── SIZE TABLE ── */
  .size-section { margin-bottom: 24px; }

  .size-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .size-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .color-chip {
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .color-chip:hover { border-color: var(--accent); color: var(--accent); }
  .color-chip.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: 500; }

  .size-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .size-table th {
    text-align: left;
    padding: 8px 10px;
    background: var(--surface2);
    color: var(--text3);
    font-size: 11px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .size-table th:first-child { border-radius: 6px 0 0 6px; }
  .size-table th:last-child  { border-radius: 0 6px 6px 0; }

  .size-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .size-table tr:last-child td { border-bottom: none; }

  .badge-tersedia {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-true  { background: rgba(76,175,125,0.15); color: var(--green); }
  .badge-false { background: rgba(224,92,92,0.15);  color: var(--red);   text-decoration: line-through; }

  .no-variants {
    color: var(--text3);
    font-size: 13px;
    padding: 16px 0;
    text-align: center;
  }

  /* ── CLOSE ── */
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  /* ── ORDER BUTTON in modal ── */
  .modal-order {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .modal-order:hover { background: var(--accent2); }

  /* ── LOADING / EMPTY ── */
  .loading, .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    color: var(--red);
    padding: 16px;
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
    margin: 24px 0;
  }

  @media (min-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    .overlay { align-items: center; padding: 20px; }
    .modal { border-radius: 20px; max-height: 85vh; }
    .modal-handle { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">Jastip <span>by jfr</span></div>
    <a class="order-btn" id="wa-header" href="#" target="_blank" style="display:none">Order via WA</a>
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="chip active" data-cat="Semua">Semua</button>
  </div>
</header>

<main class="main">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Memuat katalog...</div>
  </div>
  <div id="error-container"></div>
  <div class="count" id="count" style="display:none"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-img-container"></div>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID   = '1fEYltDCjE5ReKyuWI_rjSLmrDwj5KGaouXt689gYHkU';
const WA_NUMBER  = '62xxxxxxxxxx'; // Ganti dengan nomor WA kamu (format: 62xxx)
const STORE_NAME = 'Jastip from China';

// ── STATE ────────────────────────────────────────────────────────────────────
let products = [];
let variants  = [];
let activeCategory = 'Semua';
let activeColor    = null;

// ── FETCH ────────────────────────────────────────────────────────────────────
async function fetchSheet(sheetName) {
  // Sheet GIDs — update if sheet order changes
  const GID_MAP = {
    'products_public': '120988448',
    'variants': '212657426'
  };
  const gid = GID_MAP[sheetName] || '0';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const csv  = await res.text();
  return parseCSV(csv);
}

function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj  = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"' && !inQ) { inQ = true; continue; }
    if (ch === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; continue; }
    if (ch === '"' && inQ) { inQ = false; continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

function formatIDR(val) {
  const num = typeof val === 'string' ? parseFloat(val.replace(/,/g,'')) : val;
  if (!num) return '-';
  return 'Rp ' + num.toLocaleString('id-ID');
}

// ── RENDER GRID ──────────────────────────────────────────────────────────────
function renderGrid() {
  const grid  = document.getElementById('grid');
  const count = document.getElementById('count');
  const filtered = activeCategory === 'Semua'
    ? products.filter(p => String(p.aktif).toUpperCase() !== 'FALSE')
    : products.filter(p => p.kategori === activeCategory && String(p.aktif).toUpperCase() !== 'FALSE');

  count.style.display = 'block';
  count.textContent   = `${filtered.length} produk`;
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">Tidak ada produk di kategori ini.</div>';
    return;
  }

  filtered
    .sort((a,b) => (Number(a.urutan)||99) - (Number(b.urutan)||99))
    .forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 40}ms`;
      card.innerHTML = `
        ${p.image_url_direct
          ? `<img class="card-img" src="${p.image_url_direct}" alt="${p.nama}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="card-img-placeholder" style="${p.image_url_direct ? 'display:none' : ''}">🛍️</div>
        <div class="card-body">
          <div class="card-name">${p.nama}</div>
          <div class="card-price">${formatIDR(p.harga_jual_idr)}</div>
          <div class="card-kategori">${p.kategori || ''}</div>
        </div>`;
      card.onclick = () => openModal(p);
      grid.appendChild(card);
    });
}

// ── FILTER CHIPS ─────────────────────────────────────────────────────────────
function buildFilters() {
  const bar  = document.getElementById('filter-bar');
  const cats = ['Semua', ...new Set(products.map(p => p.kategori).filter(Boolean))];
  bar.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (cat === activeCategory ? ' active' : '');
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
      renderGrid();
    };
    bar.appendChild(btn);
  });
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(product) {
  const pVariants = variants.filter(v => v.product_id === product.id);
  const colors    = [...new Set(pVariants.map(v => v.warna).filter(v => v && v !== '-'))];
  activeColor     = colors[0] || null;

  // Image
  const imgContainer = document.getElementById('modal-img-container');
  imgContainer.innerHTML = product.image_url_direct
    ? `<img class="modal-img" src="${product.image_url_direct}" alt="${product.nama}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
       <div class="modal-img-placeholder" style="display:none">🛍️</div>`
    : `<div class="modal-img-placeholder">🛍️</div>`;

  renderModalContent(product, pVariants, colors);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalContent(product, pVariants, colors) {
  const content = document.getElementById('modal-content');
  const waText  = encodeURIComponent(`Halo, saya tertarik order:\n*${product.nama}*\nHarga: ${formatIDR(product.harga_jual_idr)}${activeColor ? '\nWarna: ' + activeColor : ''}\n\nMohon info ketersediaan ya 🙏`);
  const waLink  = `https://wa.me/${WA_NUMBER}?text=${waText}`;

  // Color filter
  const colorHTML = colors.length > 0 ? `
    <div class="size-section">
      <div class="size-title">Pilih Warna</div>
      <div class="size-filter" id="color-filter">
        ${colors.map(c => `<button class="color-chip ${c === activeColor ? 'active' : ''}" data-color="${c}">${c}</button>`).join('')}
      </div>
    </div>` : '';

  // Size table
  const shownVariants = activeColor
    ? pVariants.filter(v => v.warna === activeColor)
    : pVariants;

  const hasSize = shownVariants.some(v => v.ukuran && v.ukuran !== '-');
  const sizeHTML = pVariants.length > 0 ? `
    <div class="size-section">
      <div class="size-title">Ukuran Tersedia</div>
      ${shownVariants.length > 0 ? `
        <table class="size-table">
          <thead><tr>
            ${hasSize ? '<th>Ukuran</th>' : ''}
            <th>Keterangan</th>
            <th>Status</th>
          </tr></thead>
          <tbody>
            ${shownVariants.map(v => `
              <tr>
                ${hasSize ? `<td><strong>${v.ukuran || '-'}</strong></td>` : ''}
                <td style="color:var(--text2);font-size:12px">${v.keterangan || '-'}</td>
                <td><span class="badge-tersedia badge-${String(v.tersedia).toUpperCase() === 'TRUE' ? 'true' : 'false'}">${String(v.tersedia).toUpperCase() === 'TRUE' ? 'Tersedia' : 'Habis'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>` : '<div class="no-variants">Pilih warna untuk melihat ukuran</div>'}
    </div>` : '';

  content.innerHTML = `
    <div class="modal-kategori">${product.kategori || ''}</div>
    <div class="modal-name">${product.nama}</div>
    <div class="modal-price">${formatIDR(product.harga_jual_idr)}</div>
    ${colorHTML}
    ${sizeHTML}
    <a class="modal-order" href="${waLink}" target="_blank" style="display:none">💬 Order via WhatsApp</a>`;

  // Color chip events
  content.querySelectorAll('.color-chip').forEach(btn => {
    btn.onclick = () => {
      activeColor = btn.dataset.color;
      content.querySelectorAll('.color-chip').forEach(b => b.classList.toggle('active', b.dataset.color === activeColor));
      renderModalContent(product, pVariants, colors);
    };
  });
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('overlay').onclick = e => { if (e.target === document.getElementById('overlay')) closeModal(); };

// WA header button
document.getElementById('wa-header').href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent('Halo, saya ingin tanya tentang produk jastip 🙏')}`;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [prods, vars] = await Promise.all([
      fetchSheet('products_public'),
      fetchSheet('variants')
    ]);

    products = prods.filter(p => p.id);
    variants  = vars.filter(v => v.product_id);

    document.getElementById('loading').style.display = 'none';
    buildFilters();
    renderGrid();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-container').innerHTML = `
      <div class="error-msg">
        Gagal memuat data. Pastikan Google Sheet sudah di-share "Anyone with link can view".<br>
        <small style="opacity:0.7">${err.message}</small>
      </div>`;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
